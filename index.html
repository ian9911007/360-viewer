<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="./manifest.json" />
  <title>360 Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.css" />
  <style>
    :root {
      color-scheme: dark;
      --glass: rgba(12, 12, 14, .72);
      --line: rgba(255, 255, 255, .14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    #viewer,
    #compareViewer {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #compareViewer {
      display: none;
      left: 50%;
    }

    body.compare #viewer {
      right: 50%;
    }

    body.compare #compareViewer {
      display: block;
    }

    #divider {
      display: none;
      position: fixed;
      z-index: 21;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(255, 255, 255, .72);
    }

    body.compare #divider {
      display: block;
    }

    #startScreen {
      position: fixed;
      z-index: 50;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #111;
    }

    #panel {
      width: min(460px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      color: #fff;
      text-align: center;
      background: rgba(35, 35, 38, .96);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .45);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, .7);
      line-height: 1.5;
    }

    .primary {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      color: #fff;
      background: #147efb;
      font-size: 17px;
      font-weight: 650;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #fileInput,
    #compareInput {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #dropHint {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255, 255, 255, .48);
    }

    #toolbar {
      position: fixed;
      z-index: 40;
      left: 12px;
      max-width: calc(100vw - 24px);
      bottom: calc(12px + env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      scrollbar-width: none;
    }

    #toolbar::-webkit-scrollbar {
      display: none;
    }

    #toolbar button,
    #toolbar label[for] {
      flex: 0 0 auto;
      min-height: 40px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: #fff;
      background: rgba(255, 255, 255, .08);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #toolbar button.active,
    #toolbar label[for].active {
      background: #147efb;
      border-color: #147efb;
    }

    #toolbar.collapsed button:not(#toggleToolbarButton),
    #toolbar.collapsed label[for] {
      display: none;
    }

    #toolbar.collapsed .icon-collapse {
      display: none;
    }

    #toolbar.collapsed .icon-expand {
      display: block !important;
    }

    #status {
      position: fixed;
      z-index: 60;
      top: calc(14px + env(safe-area-inset-top));
      left: 50%;
      display: none;
      max-width: calc(100% - 28px);
      padding: 9px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(0, 0, 0, .68);
      transform: translateX(-50%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 14px;
      white-space: nowrap;
    }

    #grid {
      pointer-events: none;
      position: fixed;
      z-index: 22;
      inset: 0;
      display: none;
      background-image: linear-gradient(rgba(255, 255, 255, .20) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .20) 1px, transparent 1px);
      background-size: 12.5% 12.5%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .35);
    }

    #grid::before,
    #grid::after {
      content: "";
      position: absolute;
      background: rgba(255, 80, 80, .85);
    }

    #grid::before {
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
    }

    #grid::after {
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
    }

    #drawer {
      position: fixed;
      z-index: 70;
      top: 0;
      right: 0;
      width: min(390px, 92vw);
      height: 100%;
      padding: calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
      overflow: auto;
      color: #fff;
      background: rgba(16, 16, 18, .96);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      transform: translateX(102%);
      transition: transform .22s ease;
      border-left: 1px solid var(--line);
    }

    #drawer.open {
      transform: translateX(0);
    }

    .drawerHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .drawerHead h2 {
      margin: 0;
      font-size: 20px;
    }

    .iconBtn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: #fff;
      background: rgba(255, 255, 255, .08);
    }

    .section {
      margin: 18px 0;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row button {
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 11px;
      color: #fff;
      background: rgba(255, 255, 255, .08);
    }

    .slider {
      width: 100%;
    }

    #meta {
      margin: 0;
      padding: 12px 14px;
      overflow: auto;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--line);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px;
      align-items: baseline;
    }

    .meta-key {
      color: rgba(255, 255, 255, .45);
      font-size: 12px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      text-align: right;
      white-space: nowrap;
    }

    .meta-val {
      color: #fff;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-word;
    }

    #dropOverlay {
      pointer-events: none;
      position: fixed;
      z-index: 90;
      inset: 14px;
      display: none;
      place-items: center;
      border: 2px dashed rgba(255, 255, 255, .7);
      border-radius: 24px;
      color: #fff;
      background: rgba(20, 20, 24, .72);
      font-size: 20px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    body.dragging #dropOverlay {
      display: grid;
    }

    .psv-navbar {
      display: none !important;
    }

    @media (max-width:700px) {
      #toolbar {
        border-radius: 16px;
      }

      #toolbar button {
        min-height: 42px;
      }
    }
  </style>
</head>

<body>
  <div id="viewer"></div>
  <div id="compareViewer"></div>
  <div id="divider"></div>
  <div id="grid"></div>
  <div id="dropOverlay">放開以載入全景圖</div>

  <div id="startScreen">
    <div id="panel">
      <h1>360 Viewer</h1>
      <p>選擇一張 2:1 等距柱狀全景圖。圖片只在目前瀏覽器本機處理，不會上傳。</p>
      <label id="chooseButton" class="primary" for="fileInput">選擇全景圖片</label>
      <div id="dropHint">Mac 可直接拖放 JPEG、PNG、WebP、HEIC</div>
      <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" />
      <input id="compareInput" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" />
    </div>
  </div>

  <div id="status"></div>

  <div id="toolbar">
    <button id="toggleToolbarButton" style="padding:0 10px; display:flex; align-items:center; justify-content:center;">
      <svg class="icon-collapse" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6" />
      </svg>
      <svg class="icon-expand" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <path d="M9 18l6-6-6-6" />
      </svg>
    </button>
    <button id="motionButton">體感</button>
    <button data-angle="-90">左邊</button>
    <button data-angle="0">正面</button>
    <button data-angle="90">右邊</button>
    <button data-look="zenith">頂部</button>
    <button data-look="nadir">底部</button>
    <button id="seamButton">接縫</button>
    <button id="gridButton">格線</button>
    <label id="compareButton" for="compareInput">比較</label>
    <label id="changeButton" for="fileInput">換圖</label>
    <button id="fullscreenButton">全螢幕</button>
    <button id="infoButton">資訊</button>
    <button id="shareButton">分享</button>
  </div>

  <aside id="drawer">
    <div class="drawerHead">
      <h2>360 檢查工具</h2><button id="closeDrawer" class="iconBtn">✕</button>
    </div>
    <div class="section">
      <h3>影像調整</h3>
      <label>曝光 <span id="brightnessValue">100%</span></label>
      <input id="brightness" class="slider" type="range" min="50" max="160" value="100" />
      <label>對比 <span id="contrastValue">100%</span></label>
      <input id="contrast" class="slider" type="range" min="50" max="160" value="100" />
      <p style="margin:8px 0 0;font-size:12px">這是顯示端曝光／對比預覽，不會修改原始檔，也不等同 HDR Tone Mapping。</p>
    </div>
    <div class="section">
      <h3>檔案與 Metadata</h3>
      <div id="meta">
        <div style="grid-column:1/-1;color:rgba(255,255,255,.5);text-align:center;font-size:13px;padding:12px 0;">尚未載入圖片
        </div>
      </div>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.module.js",
        "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.14.3/index.module.js"
      }
    }
  </script>

  <script type="module">
    import { Viewer } from "@photo-sphere-viewer/core";
    import { GyroscopePlugin } from "@photo-sphere-viewer/gyroscope-plugin";

    const $ = (s) => document.querySelector(s);
    const $$ = (s) => [...document.querySelectorAll(s)];
    const els = {
      viewer: $("#viewer"), compareViewer: $("#compareViewer"), start: $("#startScreen"), toolbar: $("#toolbar"),
      status: $("#status"), file: $("#fileInput"), compareFile: $("#compareInput"), drawer: $("#drawer"), meta: $("#meta")
    };

    let viewer, compareViewer, gyroscope, primaryUrl, compareUrl, originalFile, seamUrl;
    let motionEnabled = false, compareEnabled = false, seamEnabled = false;
    const savedFov = Number(localStorage.getItem("360lab-fov") || 90);

    function toast(message) {
      els.status.textContent = message;
      els.status.style.display = "block";
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => { els.status.style.display = "none"; }, 2600);
    }

    function cancelMotion() {
      if (motionEnabled && gyroscope) {
        gyroscope.stop();
        motionEnabled = false;
        $("#motionButton").classList.remove("active");
        toast("已關閉體感");
      }
    }

    els.file.addEventListener("click", (e) => { e.target.value = ""; });
    els.compareFile.addEventListener("click", (e) => { e.target.value = ""; });

    function zoomForFov(fov) {
      const minFov = 30, maxFov = 120;
      return Math.max(0, Math.min(100, ((maxFov - fov) / (maxFov - minFov)) * 100));
    }

    async function dimensions(file) {
      const url = URL.createObjectURL(file);
      try {
        const img = new Image();
        img.src = url;
        await img.decode();
        return { width: img.naturalWidth, height: img.naturalHeight };
      } finally { URL.revokeObjectURL(url); }
    }

    async function validate(file) {
      if (!file.type.startsWith("image/")) throw new Error("不是支援的影像檔");
      const d = await dimensions(file);
      const ratio = d.width / d.height;
      if (Math.abs(ratio - 2) > 0.01) throw new Error(`圖片為 ${d.width}×${d.height}，不是精確 2:1`);
      return d;
    }

    function createViewer(container, panorama) {
      return new Viewer({
        container,
        panorama,
        defaultYaw: 0,
        defaultPitch: 0,
        defaultZoomLvl: zoomForFov(savedFov),
        minFov: 30,
        maxFov: 120,
        mousewheelCtrlKey: false,
        touchmoveTwoFingers: false,
        navbar: false,
        plugins: [GyroscopePlugin],
      });
    }

    async function readMetadata(file, d) {
      let parsed = {};
      try { parsed = await window.exifr.parse(file, { tiff: true, exif: true, xmp: true, gps: true, iptc: true }) || {}; }
      catch (error) { parsed = { 解析狀態: "無法解析或檔案沒有可讀 Metadata" }; }
      const summary = {
        檔名: file.name, 格式: file.type || "未知", 大小: `${(file.size / 1048576).toFixed(2)} MB`,
        尺寸: `${d.width} × ${d.height}`, 比例: (d.width / d.height).toFixed(4),
        是否為2比1: Math.abs(d.width / d.height - 2) <= .01 ? "是" : "否",
        ...parsed
      };
      els.meta.innerHTML = Object.entries(summary)
        .map(([k, v]) => `<div class="meta-key">${k}</div><div class="meta-val">${typeof v === 'object' ? JSON.stringify(v) : v}</div>`)
        .join("");
    }

    async function loadPrimary(file) {
      try {
        const d = await validate(file);
        originalFile = file;
        if (primaryUrl) URL.revokeObjectURL(primaryUrl);
        if (seamUrl) { URL.revokeObjectURL(seamUrl); seamUrl = null; }
        primaryUrl = URL.createObjectURL(file);
        if (!viewer) {
          viewer = createViewer(els.viewer, primaryUrl);
          gyroscope = viewer.getPlugin(GyroscopePlugin);
          els.viewer.addEventListener("pointerdown", () => {
            cancelMotion();
            $$("[data-angle], [data-look]").forEach((b) => b.classList.remove("active"));
          }, { capture: true, passive: true });
        } else {
          await viewer.setPanorama(primaryUrl, { transition: false, position: { yaw: 0, pitch: 0 }, zoom: zoomForFov(savedFov) });
        }
        if (gyroscope?.isEnabled()) gyroscope.stop();
        motionEnabled = false;
        seamEnabled = false;
        $("#seamButton").classList.remove("active");
        els.start.style.display = "none";
        els.toolbar.style.display = "flex";
        await readMetadata(file, d);
        toast(`已載入 ${d.width}×${d.height}`);
      } catch (error) { toast(error.message); }
    }

    async function loadCompare(file) {
      try {
        const d = await validate(file);
        if (compareUrl) URL.revokeObjectURL(compareUrl);
        compareUrl = URL.createObjectURL(file);
        if (!compareViewer) compareViewer = createViewer(els.compareViewer, compareUrl);
        else await compareViewer.setPanorama(compareUrl, { transition: false });
        compareEnabled = true;
        document.body.classList.add("compare");
        $("#compareButton").classList.add("active");
        toast(`比較圖已載入 ${d.width}×${d.height}`);
      } catch (error) { toast(error.message); }
    }

    async function createSeamImage(file) {
      const url = URL.createObjectURL(file);
      try {
        const img = new Image(); img.src = url; await img.decode();
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        const ctx = canvas.getContext("2d");
        const half = canvas.width / 2;
        ctx.drawImage(img, half, 0, half, canvas.height, 0, 0, half, canvas.height);
        ctx.drawImage(img, 0, 0, half, canvas.height, half, 0, half, canvas.height);
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", .94));
        return URL.createObjectURL(blob);
      } finally { URL.revokeObjectURL(url); }
    }

    els.file.addEventListener("change", () => els.file.files?.[0] && loadPrimary(els.file.files[0]));
    els.compareFile.addEventListener("change", () => els.compareFile.files?.[0] && loadCompare(els.compareFile.files[0]));

    $$("[data-angle]").forEach((button) => button.addEventListener("click", () => {
      cancelMotion();
      const angle = Number(button.dataset.angle);
      const yaw = angle * Math.PI / 180;
      viewer?.animate({ yaw, pitch: 0, speed: "2rpm" });
      compareViewer?.animate({ yaw, pitch: 0, speed: "2rpm" });
      $$("[data-angle], [data-look]").forEach((b) => b.classList.toggle("active", b === button));
      toast(`視角 ${button.textContent}`);
    }));

    $("#motionButton").addEventListener("click", async () => {
      if (!gyroscope) return;
      try {
        if (motionEnabled) { gyroscope.stop(); motionEnabled = false; }
        else {
          if (typeof DeviceOrientationEvent?.requestPermission === "function") {
            const result = await DeviceOrientationEvent.requestPermission();
            if (result !== "granted") throw new Error("未允許動作與方向存取");
          }
          await gyroscope.start(); motionEnabled = true;
        }
        $("#motionButton").classList.toggle("active", motionEnabled);
        toast(motionEnabled ? "體感已開啟" : "體感已關閉");
      } catch (error) { toast(error.message || "無法啟用體感"); }
    });

    $("#gridButton").addEventListener("click", () => {
      const on = $("#grid").style.display !== "block";
      $("#grid").style.display = on ? "block" : "none";
      $("#gridButton").classList.toggle("active", on);
    });

    $("#seamButton").addEventListener("click", async () => {
      if (!viewer || !originalFile) return;
      seamEnabled = !seamEnabled;
      if (seamEnabled) {
        if (!seamUrl) seamUrl = await createSeamImage(originalFile);
        await viewer.setPanorama(seamUrl, { transition: false, position: { yaw: 0, pitch: 0 } });
        toast("接縫已移至畫面中央");
      } else {
        await viewer.setPanorama(primaryUrl, { transition: false });
        toast("已返回原始全景");
      }
      $("#seamButton").classList.toggle("active", seamEnabled);
    });

    $("#compareButton").addEventListener("click", (e) => {
      if (compareEnabled) {
        e.preventDefault();
        compareEnabled = false;
        document.body.classList.remove("compare");
        $("#compareButton").classList.remove("active");
      }
    });

    $("#fullscreenButton").addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch { toast("iPhone Safari 請加入主畫面以移除瀏覽器 UI"); }
    });

    $("#shareButton").addEventListener("click", async () => {
      try {
        if (navigator.share) await navigator.share({ title: "360 Viewer", text: "360 全景瀏覽器", url: location.href });
        else { await navigator.clipboard.writeText(location.href); toast("網站網址已複製"); }
      } catch { }
    });

    $("#infoButton").addEventListener("click", () => els.drawer.classList.add("open"));
    $("#closeDrawer").addEventListener("click", () => els.drawer.classList.remove("open"));

    $$("[data-look]").forEach((button) => button.addEventListener("click", () => {
      cancelMotion();
      const target = button.dataset.look;
      const pitch = target === "zenith" ? Math.PI / 2 : target === "nadir" ? -Math.PI / 2 : 0;
      viewer?.animate({ yaw: 0, pitch, speed: "2rpm" });
      compareViewer?.animate({ yaw: 0, pitch, speed: "2rpm" });
      $$("[data-angle], [data-look]").forEach((b) => b.classList.toggle("active", b === button));
      toast(`視角 ${button.textContent}`);
    }));

    function applyFilters() {
      const b = $("#brightness").value, c = $("#contrast").value;
      $(".psv-canvas-container")?.style.setProperty("filter", `brightness(${b}%) contrast(${c}%)`);
      $("#brightnessValue").textContent = `${b}%`;
      $("#contrastValue").textContent = `${c}%`;
    }
    $("#brightness").addEventListener("input", applyFilters);
    $("#contrast").addEventListener("input", applyFilters);

    ["dragenter", "dragover"].forEach((name) => window.addEventListener(name, (e) => { e.preventDefault(); document.body.classList.add("dragging"); }));
    ["dragleave", "drop"].forEach((name) => window.addEventListener(name, (e) => { e.preventDefault(); document.body.classList.remove("dragging"); }));
    window.addEventListener("drop", (e) => e.dataTransfer.files?.[0] && loadPrimary(e.dataTransfer.files[0]));

    window.addEventListener("beforeunload", () => {
      [primaryUrl, compareUrl, seamUrl].filter(Boolean).forEach(URL.revokeObjectURL);
    });

    $("#toggleToolbarButton").addEventListener("click", () => {
      $("#toolbar").classList.toggle("collapsed");
    });
  </script>
</body>
