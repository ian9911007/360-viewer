<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />

  <title>360 全景預覽</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #viewer {
      position: fixed;
      inset: 0;
    }

    #startScreen {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #111;
    }

    #panel {
      width: min(420px, 100%);
      padding: 28px;
      border-radius: 24px;
      color: #fff;
      text-align: center;
      background: rgba(35, 35, 35, 0.96);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 22px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.5;
    }

    .button {
      display: block;
      width: 100%;
      min-height: 52px;
      margin-top: 12px;
      padding: 14px 18px;
      border: 0;
      border-radius: 14px;
      color: #fff;
      background: #147efb;
      font-size: 17px;
      font-weight: 600;
    }

    #fileInput {
      display: none;
    }

    #controls {
      position: fixed;
      z-index: 30;
      left: 14px;
      right: 14px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      display: none;
      gap: 10px;
      pointer-events: none;
    }

    #controls button {
      flex: 1;
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font-size: 15px;
      font-weight: 600;
      pointer-events: auto;
    }

    #status {
      position: fixed;
      z-index: 31;
      top: calc(16px + env(safe-area-inset-top));
      left: 50%;
      display: none;
      max-width: calc(100% - 32px);
      padding: 9px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(0, 0, 0, 0.58);
      transform: translateX(-50%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 14px;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="viewer"></div>

  <div id="startScreen">
    <div id="panel">
      <h1>360 全景預覽</h1>
      <p>選擇一張 2:1 等距柱狀全景圖，圖片只在目前瀏覽器中處理。</p>

      <button id="chooseButton" class="button">選擇全景圖片</button>
      <input
        id="fileInput"
        type="file"
        accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
      />
    </div>
  </div>

  <div id="status"></div>

  <div id="controls">
    <button id="motionButton">開啟體感</button>
    <button id="changeButton">更換圖片</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.module.js",
        "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.14.3/index.module.js"
      }
    }
  </script>

  <script type="module">
    import { Viewer } from "@photo-sphere-viewer/core";
    import { GyroscopePlugin } from "@photo-sphere-viewer/gyroscope-plugin";

    const chooseButton = document.querySelector("#chooseButton");
    const fileInput = document.querySelector("#fileInput");
    const startScreen = document.querySelector("#startScreen");
    const controls = document.querySelector("#controls");
    const motionButton = document.querySelector("#motionButton");
    const changeButton = document.querySelector("#changeButton");
    const status = document.querySelector("#status");

    let viewer = null;
    let gyroscope = null;
    let objectUrl = null;
    let motionEnabled = false;

    function showStatus(message) {
      status.textContent = message;
      status.style.display = "block";

      window.clearTimeout(showStatus.timer);

      showStatus.timer = window.setTimeout(() => {
        status.style.display = "none";
      }, 2500);
    }

    function openPicker() {
      fileInput.value = "";
      fileInput.click();
    }

    chooseButton.addEventListener("click", openPicker);
    changeButton.addEventListener("click", openPicker);

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files?.[0];

      if (!file) {
        return;
      }

      if (objectUrl) {
        URL.revokeObjectURL(objectUrl);
      }

      objectUrl = URL.createObjectURL(file);

      if (!viewer) {
        viewer = new Viewer({
          container: document.querySelector("#viewer"),
          panorama: objectUrl,

          defaultYaw: 0,
          defaultPitch: 0,

          defaultZoomLvl: 35,
          minFov: 35,
          maxFov: 85,

          mousewheelCtrlKey: false,
          touchmoveTwoFingers: false,

          navbar: [
            "zoom",
            "move",
            "fullscreen",
          ],

          plugins: [
            GyroscopePlugin,
          ],
        });

        gyroscope = viewer.getPlugin(GyroscopePlugin);
      } else {
        await viewer.setPanorama(objectUrl, {
          transition: false,
          position: {
            yaw: 0,
            pitch: 0,
          },
          zoom: 35,
        });
      }

      startScreen.style.display = "none";
      controls.style.display = "flex";

      motionEnabled = false;
      motionButton.textContent = "開啟體感";

      showStatus("全景圖片已載入");
    });

    motionButton.addEventListener("click", async () => {
      if (!gyroscope) {
        showStatus("體感模組尚未載入");
        return;
      }

      try {
        if (motionEnabled) {
          gyroscope.stop();
          motionEnabled = false;
          motionButton.textContent = "開啟體感";
          showStatus("體感已關閉");
          return;
        }

        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const permission =
            await DeviceOrientationEvent.requestPermission();

          if (permission !== "granted") {
            showStatus("未允許動作與方向存取");
            return;
          }
        }

        await gyroscope.start();

        motionEnabled = true;
        motionButton.textContent = "關閉體感";
        showStatus("體感已開啟");
      } catch (error) {
        console.error(error);
        showStatus("Safari 無法啟用體感");
      }
    });
  </script>
</body>
</html>
